<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memento Academy Bot Status</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="logo.png">
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <img src="logo.png" alt="Memento Bot Logo" class="logo-img">
          <h1>Memento Bot</h1>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="dot"></div>
          <span>Online</span>
        </div>
      </header>

      <main>
        <div class="card glass">
          <h2>System Status</h2>
          <div class="grid">
            <div class="stat-item">
              <span class="label">Platform</span>
              <span class="value">Koyeb / Railway</span>
            </div>
            <div class="stat-item">
              <span class="label">Uptime</span>
              <span class="value" id="uptime">Calculating...</span>
            </div>
            <div class="stat-item">
              <span class="label">Last Tweet</span>
              <span class="value">15 min ago</span>
            </div>
          </div>
        </div>

        <div class="platforms">
          <div class="platform-card glass twitter">
            <div class="icon">𝕏</div>
            <h3>Twitter</h3>
            <p>Connected</p>
          </div>
          <div class="platform-card glass bluesky">
            <div class="icon">🦋</div>
            <h3>Bluesky</h3>
            <p>Connected</p>
          </div>
          <div class="platform-card glass lens">
            <div class="icon">🌿</div>
            <h3>Lens</h3>
            <p>Connected</p>
          </div>
        </div>
      </main>

      <footer>
        <p>Memento Academy &copy; 2026</p>
      </footer>
    </div>

    <script>
      // Simple uptime counter
      const startTime = Date.now();
      setInterval(() => {
        const diff = Date.now() - startTime;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById("uptime").textContent =
          `${hours}h ${minutes}m ${seconds}s`;
      }, 1000);
    </script>
  </body>
</html>
