<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memento Academy Bot Status</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="bot-logo.png">
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <img src="bot-logo.png" alt="Memento Bot Logo" class="logo-img">
          <h1>Memento Bot</h1>
        </div>
        <div class="status-badge" id="statusBadge">
          <div class="dot"></div>
          <span>Online</span>
        </div>
      </header>

      <main>
        <div class="card glass">
          <h2>System Status</h2>
          <div class="grid">
            <div class="stat-item">
              <span class="label">Platform</span>
              <span class="value">Koyeb</span>
            </div>
            <div class="stat-item">
              <span class="label">Uptime</span>
              <span class="value" id="uptime">Calculating...</span>
            </div>
            <div class="stat-item">
              <span class="label">Schedule</span>
              <span class="value">Active</span>
            </div>
          </div>
        </div>

        <div class="platforms">
          <div class="platform-card glass twitter">
            <div class="icon">𝕏</div>
            <h3>Twitter</h3>
            <p>Connected</p>
          </div>
          <div class="platform-card glass bluesky">
            <div class="icon">🦋</div>
            <h3>Bluesky</h3>
            <p>Connected</p>
          </div>
          <div class="platform-card glass lens">
            <div class="icon">🌿</div>
            <h3>Lens</h3>
            <p>Connected</p>
          </div>
        </div>
      </main>

      <footer>
        <p>Memento Academy &copy; 2026</p>
      </footer>
    </div>

    <script>
      const statusBadge = document.getElementById('statusBadge');
      const dot = statusBadge.querySelector('.dot');
      const statusText = statusBadge.querySelector('span');
      const uptimeElement = document.getElementById('uptime');

      function updateStatus(isOnline) {
          if (isOnline) {
              statusBadge.style.background = 'rgba(34, 197, 94, 0.2)';
              statusBadge.style.color = 'var(--success)';
              dot.style.backgroundColor = 'var(--success)';
              dot.style.boxShadow = '0 0 10px var(--success)';
              statusText.textContent = 'Online';
          } else {
              statusBadge.style.background = 'rgba(239, 68, 68, 0.2)';
              statusBadge.style.color = '#ef4444';
              dot.style.backgroundColor = '#ef4444';
              dot.style.boxShadow = '0 0 10px #ef4444';
              statusText.textContent = 'Offline';
          }
      }

      function formatUptime(seconds) {
          const h = Math.floor(seconds / 3600);
          const m = Math.floor((seconds % 3600) / 60);
          const s = Math.floor(seconds % 60);
          return `${h}h ${m}m ${s}s`;
      }

      async function checkStatus() {
          try {
              const response = await fetch('/status');
              if (response.ok) {
                  const data = await response.json();
                  updateStatus(true);
                  uptimeElement.textContent = formatUptime(data.uptime);
              } else {
                  updateStatus(false);
              }
          } catch (error) {
              updateStatus(false);
          }
      }

      // Check immediately and then every 5 seconds
      checkStatus();
      setInterval(checkStatus, 5000);
    </script>
  </body>
</html>
