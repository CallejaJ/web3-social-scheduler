<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memento Academy Bot Status</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="bot-logo.png">
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <h1 class="pixel-logo">MEMENTO <span class="bot-text">BOT</span></h1>
        </div>
      </header>

      <main>
        <div class="terminal-container">
            <div class="scanline"></div>
            <div class="terminal-header">
                <span>TERMINAL_SESSION_01</span>
                <span>STATUS: <span id="headerStatus">CONNECTING...</span></span>
            </div>
            <div class="terminal-body" id="terminalOutput">
                <!-- Lines will be injected here -->
            </div>
        </div>
      </main>

      <footer>
        <p>Memento Academy &copy; 2026 // SYSTEM V2.0</p>
      </footer>
    </div>

    <script>
      const terminalOutput = document.getElementById('terminalOutput');
      const headerStatus = document.getElementById('headerStatus');
      
      const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      async function typeLine(text, cssClass = '') {
          const line = document.createElement('div');
          line.className = 'line ' + cssClass;
          terminalOutput.appendChild(line);
          
          // Typing effect
          let i = 0;
          const speed = 20; // ms per char
          
          // Add cursor to this line
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          line.appendChild(cursor);

          if (text.startsWith('>')) { // Fast command typing
             line.innerHTML = ''; 
             line.appendChild(cursor);
             for (let i = 0; i < text.length; i++) {
                 cursor.before(text.charAt(i));
                 await delay(speed);
                 // Auto scroll
                 terminalOutput.scrollTop = terminalOutput.scrollHeight;
             }
          } else {
             // Instant output for logs
             cursor.remove();
             line.textContent = text;
          }
           
          // Remove cursor from this line when done, unless it's the last one (we can manage that)
          cursor.remove();
          await delay(100);
      }

      async function addCursor() {
          const line = document.createElement('div');
          line.className = 'line';
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          line.appendChild(cursor);
          terminalOutput.appendChild(line);
          return line;
      }

      async function bootSequence() {
          await delay(500);
          await typeLine("> INITIALIZING MEMENTO BOT V2.0...");
          await delay(300);
          await typeLine("> LOADING KERNEL MODULES... OK");
          await delay(300);
          await typeLine("> MOUNTING FILE SYSTEM... OK");
          await delay(600);
          
          await typeLine("> CHECKING CONNECTIVITY...");
          await delay(400);

          // Check Status API
          try {
              await typeLine("> curl /status");
              const response = await fetch('/status');
              if (response.ok) {
                  const data = await response.json();
                  await typeLine(`[SYSTEM] UPTIME: ${formatUptime(data.uptime)}`, 'status-ok');
                  await typeLine("[SYSTEM] STATUS: ONLINE", 'status-ok');
                  headerStatus.textContent = "ONLINE";
                  headerStatus.style.color = "#33ff00";
              } else {
                  throw new Error("Status failed");
              }
          } catch (e) {
              await typeLine("[SYSTEM] ERROR: OFFLINE", 'status-error');
              headerStatus.textContent = "OFFLINE";
              headerStatus.style.color = "red";
          }

          // Simulate Platform Checks (Since /status doesn't return detailed platform info in valid JSON yet, we simulate or assume connected if status is ok)
          // Ideally backend would return this. For now, visual simulation as requested.
          await delay(500);
          await typeLine("> CHECKING EXTERNAL APIS...");
          await delay(800);
          await typeLine("[NET] TWITTER CONNECTION....... [ESTABLISHED]", 'status-ok');
          await delay(400);
          await typeLine("[NET] BLUESKY CONNECTION....... [ESTABLISHED]", 'status-ok');
          await delay(400);
          await typeLine("[NET] LENS PROTOCOL............ [ESTABLISHED]", 'status-ok');
          
          await delay(500);
          await typeLine("> SCHEDULER ACTIVE.");
          
          // Keep cursor blinking at bottom
          addCursor();
      }

      function formatUptime(seconds) {
          const h = Math.floor(seconds / 3600);
          const m = Math.floor((seconds % 3600) / 60);
          return `${h}h ${m}m`;
      }

      bootSequence();

      // Optional: Refresh status silently or re-run animation? 
      // Re-running full animation is annoying. Silent refresh or just keeping it static log is better.
      // Let's just keep it static after boot.
    </script>
  </body>
</html>
